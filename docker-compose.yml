version: '3.8'

services:
  # Redis 服务 - 用于 Celery 任务队列和缓存
  redis:
    image: redis:7-alpine
    container_name: defect-detection-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # PostgreSQL 服务 - 生产环境数据库（可选）
  # 默认使用 SQLite，取消注释以下配置以使用 PostgreSQL
  # postgres:
  #   image: postgres:15-alpine
