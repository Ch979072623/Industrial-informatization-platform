  #     POSTGRES_USER: defect_user
  #     POSTGRES_PASSWORD: defect_password
  #     POSTGRES_DB: defect_detection
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U defect_user -d defect_detection"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 3

  # Celery Worker 服务
  # 取消注释以下配置以使用 Docker 运行 Celery Worker
  # celery-worker:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: defect-detection-celery
  #   restart: unless-stopped
  #   command: celery -A celery_worker worker --loglevel=info --concurrency=2
  #   volumes:
  #     - ./backend:/app
  #     - ./models:/app/models
  #     - ./uploads:/app/uploads
  #   environment:
  #     - CELERY_BROKER_URL=redis://redis:6379/1
  #     - CELERY_RESULT_BACKEND=redis://redis:6379/2
  #     - DATABASE_URL=sqlite+aiosqlite:///./app.db
  #   depends_on:
  #     - redis
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

volumes:
  redis_data:
  # postgres_data:

networks:
  default:
    name: defect-detection-network
