name: defect-detection
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Python 版本
  - python=3.11
  
  # 基础工具
  - pip
  - git
  
  # 核心依赖（通过 pip 安装更可靠）
  # 注意：主要依赖在 requirements.txt 中定义
  
  # 可选：通过 conda 安装 PyTorch（如需 GPU 支持）
  # 取消下面注释以使用 GPU 版本
  # - pytorch>=2.0.0
  # - torchvision>=0.15.0
  # - pytorch-cuda=12.1
  
  # 可选：通过 conda 安装（替代 pip）
  # - fastapi>=0.109.0
  # - uvicorn>=0.27.0
  # - sqlalchemy>=2.0.0
  # - alembic>=1.13.0
  # - celery>=5.3.0
  # - redis-py>=5.0.0
  # - numpy>=1.26.0
  # - pillow>=10.0.0
  # - requests>=2.31.0

  # pip 依赖
  - pip:
    - fastapi==0.109.2
    - uvicorn[standard]==0.27.1
    - python-multipart==0.0.9
    - sqlalchemy[asyncio]==2.0.25
    - alembic==1.13.1
    - aiosqlite==0.19.0
    - asyncpg==0.29.0
    - python-jose[cryptography]==3.3.0
    - passlib[bcrypt]==1.7.4
    - pydantic==2.6.1
    - pydantic-settings==2.1.0
    - celery==5.3.6
    - redis==5.0.1
    - torch==2.2.0
    - torchvision==0.17.0
    - numpy==1.26.3
    - Pillow==10.2.0
    - opencv-python==4.9.0.78
    - albumentations==1.3.1
    - python-dotenv==1.0.0
    - httpx==0.26.0
    - aiofiles==23.2.1
    - pytest==8.0.0
    - pytest-asyncio==0.23.4
    - black==24.1.1
    - isort==5.13.2
    - mypy==1.8.0
